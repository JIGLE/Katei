name: Build & Push to GHCR

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - "entrypoint.sh"
      - "restore.sh"
      - "schema.sql"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: katei
          POSTGRES_PASSWORD: katei
          POSTGRES_DB: katei_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U katei"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          # Integration tests run the route layer against this database; the
          # pure unit tests ignore it. Without DATABASE_URL they skip cleanly.
          DATABASE_URL: postgresql://katei:katei@localhost:5432/katei_test

  build:
    name: Build single image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Expose ACTIONS_CACHE_URL / RUNTIME_TOKEN so `type=gha` cache works when we
      # drive buildx directly (below) instead of via build-push-action.
      - name: Expose GitHub Actions cache to buildx
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/jigle/katei
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Booting the docker-container builder pulls moby/buildkit from Docker Hub,
      # which occasionally resets the connection and fails the whole run. Retry the
      # builder bootstrap + build so a transient Docker Hub blip doesn't block a ship.
      - name: Build & push (with retry on transient Docker Hub flakes)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 3
          retry_wait_seconds: 20
          command: |
            docker buildx inspect katei >/dev/null 2>&1 \
              || docker buildx create --name katei --driver docker-container --use --bootstrap
            docker buildx use katei
            TAG_ARGS=""
            for t in ${{ steps.meta.outputs.tags }}; do TAG_ARGS="$TAG_ARGS --tag $t"; done
            docker buildx build \
              --push \
              $TAG_ARGS \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --file Dockerfile \
              .

# Katei — multi-container orchestration
# Postgres (data) + backend (Fastify API) + frontend (nginx-served SPA).
# Designed to run self-hosted on TrueNAS SCALE.

services:
  postgres:
    image: postgres:16-alpine
    container_name: katei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - katei-db-data:/var/lib/postgresql/data
      # Auto-runs on first boot when the data volume is empty.
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - katei-net

  backend:
    build:
      context: ./backend
    container_name: katei-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_PORT: ${BACKEND_PORT}
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - katei-net

  frontend:
    build:
      context: ./frontend
    container_name: katei-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - katei-net

volumes:
  katei-db-data:

networks:
  katei-net:
    driver: bridge

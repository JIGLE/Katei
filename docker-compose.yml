# Katei — single-container deployment.
# PostgreSQL runs inside the same container as the app.
# One volume mount persists the database across restarts.

services:
  katei:
    build: .
    image: ghcr.io/jigle/katei:latest
    container_name: katei
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NODE_ENV: production
    volumes:
      - ${PGDATA_PATH:-katei-pgdata}:/var/lib/postgresql/data
    ports:
      - "${APP_PORT:-8080}:3000"

volumes:
  katei-pgdata:

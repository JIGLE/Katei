server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched paths serve index.html so
    # react-router-dom handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend Fastify service.
    # "katei-backend" resolves via Docker's internal DNS on the katei-net network.
    location /api/ {
        proxy_pass http://katei-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health probe for the nginx container itself.
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
